<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Crypto licensing process: scope, incorporate, apply, operate">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f8ff"/><stop offset="1" stop-color="#ebf1fd"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="320" rx="18" fill="url(#bg)"/>
  <text x="48" y="64" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0c1f29">How a crypto licence project works</text>
  <line x1="120" y1="190" x2="1080" y2="190" stroke="#cfe0ff" stroke-width="4"/>
  <g font-family="Arial, sans-serif">
    <g>
      <circle cx="180" cy="190" r="44" fill="#116dff"/><text x="180" y="202" font-size="34" font-weight="700" fill="#fff" text-anchor="middle">1</text>
      <text x="180" y="270" font-size="22" font-weight="700" fill="#0c1f29" text-anchor="middle">Scope</text>
    </g>
    <g>
      <circle cx="480" cy="190" r="44" fill="#116dff"/><text x="480" y="202" font-size="34" font-weight="700" fill="#fff" text-anchor="middle">2</text>
      <text x="480" y="270" font-size="22" font-weight="700" fill="#0c1f29" text-anchor="middle">Incorporate</text>
    </g>
    <g>
      <circle cx="780" cy="190" r="44" fill="#116dff"/><text x="780" y="202" font-size="34" font-weight="700" fill="#fff" text-anchor="middle">3</text>
      <text x="780" y="270" font-size="22" font-weight="700" fill="#0c1f29" text-anchor="middle">Apply</text>
    </g>
    <g>
      <circle cx="1040" cy="190" r="44" fill="#0a4fcf"/><text x="1040" y="202" font-size="34" font-weight="700" fill="#fff" text-anchor="middle">4</text>
      <text x="1040" y="270" font-size="22" font-weight="700" fill="#0c1f29" text-anchor="middle">Operate</text>
    </g>
  </g>
</svg>
