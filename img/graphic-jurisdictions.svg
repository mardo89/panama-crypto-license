<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Crypto licensing jurisdictions compared: cost, timeline, tax and regulator">
  <rect width="1200" height="320" rx="18" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="48" y="60" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0c1f29">Compare crypto jurisdictions</text>
  <g font-family="Arial, sans-serif">
    <g transform="translate(48,96)">
      <rect width="250" height="170" rx="14" fill="#f5f8ff" stroke="#cfe0ff" stroke-width="2"/>
      <text x="20" y="42" font-size="22" font-weight="800" fill="#116dff">Panama</text>
      <text x="20" y="78" font-size="16" fill="#475569">€6,000 fixed</text>
      <text x="20" y="106" font-size="16" fill="#475569">2–3 weeks</text>
      <text x="20" y="134" font-size="16" fill="#475569">0% foreign-income tax</text>
    </g>
    <g transform="translate(318,96)">
      <rect width="250" height="170" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
      <text x="20" y="42" font-size="22" font-weight="800" fill="#0c1f29">EU / MiCA</text>
      <text x="20" y="78" font-size="16" fill="#475569">CASP · passporting</text>
      <text x="20" y="106" font-size="16" fill="#475569">€50k–150k capital</text>
      <text x="20" y="134" font-size="16" fill="#475569">Lithuania · Estonia · Malta</text>
    </g>
    <g transform="translate(588,96)">
      <rect width="250" height="170" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
      <text x="20" y="42" font-size="22" font-weight="800" fill="#0c1f29">Gulf</text>
      <text x="20" y="78" font-size="16" fill="#475569">Dubai VARA</text>
      <text x="20" y="106" font-size="16" fill="#475569">Premium · 0% personal tax</text>
      <text x="20" y="134" font-size="16" fill="#475569">Institutional-grade</text>
    </g>
    <g transform="translate(858,96)">
      <rect width="294" height="170" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
      <text x="20" y="42" font-size="22" font-weight="800" fill="#0c1f29">Offshore</text>
      <text x="20" y="78" font-size="16" fill="#475569">Cayman · BVI · Seychelles</text>
      <text x="20" y="106" font-size="16" fill="#475569">0% direct tax</text>
      <text x="20" y="134" font-size="16" fill="#475569">Funds · token issuers</text>
    </g>
  </g>
</svg>
